<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>oz secrets</title>
  <style>
    :root { --bg:#0f1419; --panel:#1a2332; --text:#e7ecf3; --muted:#8b98a8; --accent:#3d8bfd; --danger:#f07178; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: ui-sans-serif, system-ui, sans-serif; background:var(--bg); color:var(--text); }
    main { max-width: 960px; margin: 0 auto; padding: 2rem 1rem 4rem; }
    h1 { font-size: 1.5rem; margin: 0 0 1rem; }
    h2 { font-size: 1rem; color: var(--muted); margin: 2rem 0 .75rem; text-transform: uppercase; letter-spacing: .08em; }
    .card { background: var(--panel); border: 1px solid #243044; border-radius: 10px; padding: 1rem; margin-bottom: 1rem; }
    button, input, select { font: inherit; }
    button { background: var(--accent); color: #fff; border: 0; border-radius: 8px; padding: .55rem .9rem; cursor: pointer; }
    button.secondary { background: #2a3648; }
    button.danger { background: var(--danger); }
    input, select { width: 100%; background: #111822; color: var(--text); border: 1px solid #2a3648; border-radius: 8px; padding: .55rem .7rem; margin: .25rem 0 .75rem; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
    .muted { color: var(--muted); font-size: .9rem; }
    .error { color: var(--danger); }
    ul { list-style: none; padding: 0; margin: 0; }
    li { display: flex; justify-content: space-between; align-items: center; padding: .5rem 0; border-bottom: 1px solid #243044; gap: .5rem; }
    code { background: #111822; padding: .15rem .35rem; border-radius: 4px; }
    .hidden { display: none; }
    #key-once { word-break: break-all; background:#111822; padding:.75rem; border-radius:8px; }
  </style>
</head>
<body>
  <main>
    <h1>oz secrets</h1>
    <div id="signed-out" class="card">
      <p class="muted">Sign in with GitHub to manage projects, API keys, and secrets.</p>
      <a href="/auth/github"><button type="button">Sign in with GitHub</button></a>
    </div>
    <div id="signed-in" class="hidden">
      <div class="card">
        <div id="profile"></div>
        <button type="button" class="secondary" id="logout-btn">Sign out</button>
      </div>

      <h2>Projects</h2>
      <div class="card">
        <div class="row">
          <div><label>Slug<input id="project-slug" placeholder="my-app"></label></div>
          <div><label>Name<input id="project-name" placeholder="My App"></label></div>
        </div>
        <button type="button" id="create-project">Create project</button>
        <ul id="projects"></ul>
      </div>

      <h2>API keys</h2>
      <div class="card">
        <label>Name<input id="key-name" placeholder="CI deploy"></label>
        <label>Project<select id="key-project"></select></label>
        <label>Permission<select id="key-perm"><option value="read">read</option><option value="write">write</option></select></label>
        <button type="button" id="create-key">Create API key</button>
        <div id="key-once-wrap" class="hidden">
          <p class="muted">Copy this key now. It won't be shown again.</p>
          <div id="key-once"></div>
        </div>
        <ul id="keys"></ul>
      </div>

      <h2>Secrets</h2>
      <div class="card">
        <label>Project<select id="secret-project"></select></label>
        <ul id="secrets"></ul>
        <div class="row">
          <div><label>Key<input id="secret-key" placeholder="DATABASE_URL"></label></div>
          <div><label>Value<input id="secret-value" type="password" placeholder="value"></label></div>
        </div>
        <button type="button" id="save-secret">Save secret</button>
      </div>
      <p id="msg" class="muted"></p>
    </div>
  </main>
  <script>
    const msg = (t, err=false) => { const el = document.getElementById('msg'); el.textContent = t||''; el.className = err ? 'error' : 'muted'; };
    async function api(path, opts={}) {
      const res = await fetch(path, { credentials:'include', headers:{'Content-Type':'application/json', ...(opts.headers||{})}, ...opts });
      if (!res.ok) { const e = await res.json().catch(()=>({error:res.statusText})); throw new Error(e.error||res.statusText); }
      if (res.status === 204) return null;
      return res.json();
    }
    let projects = [];
    async function loadMe() {
      try {
        const me = await api('/api/me');
        document.getElementById('signed-out').classList.add('hidden');
        document.getElementById('signed-in').classList.remove('hidden');
        document.getElementById('profile').innerHTML = `<strong>${me.login}</strong><div class="muted">${me.name||''}</div>`;
        await refreshProjects();
        await refreshKeys();
      } catch {
        document.getElementById('signed-out').classList.remove('hidden');
        document.getElementById('signed-in').classList.add('hidden');
      }
    }
    async function refreshProjects() {
      projects = await api('/api/projects');
      const ul = document.getElementById('projects');
      ul.innerHTML = projects.map(p => `<li><span><code>${p.slug}</code> ${p.name}</span></li>`).join('');
      const opts = projects.map(p => `<option value="${p.slug}">${p.slug}</option>`).join('');
      document.getElementById('key-project').innerHTML = opts;
      document.getElementById('secret-project').innerHTML = opts;
      if (projects.length) await refreshSecrets(projects[0].slug);
    }
    async function refreshKeys() {
      const keys = await api('/api/keys');
      document.getElementById('keys').innerHTML = keys.map(k => `<li><span><code>${k.key_prefix}…</code> ${k.name}</span><button class="danger" data-id="${k.id}">Revoke</button></li>`).join('');
      document.getElementById('keys').querySelectorAll('button').forEach(btn => btn.onclick = async () => {
        await api('/api/keys/' + btn.dataset.id, { method:'DELETE' });
        await refreshKeys();
      });
    }
    async function refreshSecrets(slug) {
      const list = await api('/api/projects/' + slug + '/secrets');
      const ul = document.getElementById('secrets');
      ul.innerHTML = list.map(s => `<li><span><code>${s.key_name}</code> v${s.version}</span><span><button class="secondary" data-key="${s.key_name}">Reveal</button> <button class="danger" data-del="${s.key_name}">Delete</button></span></li>`).join('');
      ul.querySelectorAll('[data-key]').forEach(btn => btn.onclick = async () => {
        const v = await api('/api/projects/' + slug + '/secrets/' + encodeURIComponent(btn.dataset.key));
        alert(v.key_name + ' = ' + v.value);
      });
      ul.querySelectorAll('[data-del]').forEach(btn => btn.onclick = async () => {
        await api('/api/projects/' + slug + '/secrets/' + encodeURIComponent(btn.dataset.del), { method:'DELETE' });
        await refreshSecrets(slug);
      });
    }
    document.getElementById('logout-btn').onclick = async () => { await api('/auth/logout', { method:'POST' }); location.reload(); };
    document.getElementById('create-project').onclick = async () => {
      try {
        await api('/api/projects', { method:'POST', body: JSON.stringify({ slug: document.getElementById('project-slug').value, name: document.getElementById('project-name').value }) });
        await refreshProjects(); msg('Project created');
      } catch (e) { msg(e.message, true); }
    };
    document.getElementById('create-key').onclick = async () => {
      try {
        const slug = document.getElementById('key-project').value;
        const project = projects.find(p => p.slug === slug);
        const created = await api('/api/keys', { method:'POST', body: JSON.stringify({ name: document.getElementById('key-name').value, scopes: [{ project_id: project.id, permission: document.getElementById('key-perm').value }] }) });
        document.getElementById('key-once-wrap').classList.remove('hidden');
        document.getElementById('key-once').textContent = created.key;
        await refreshKeys();
      } catch (e) { msg(e.message, true); }
    };
    document.getElementById('secret-project').onchange = (e) => refreshSecrets(e.target.value);
    document.getElementById('save-secret').onclick = async () => {
      try {
        const slug = document.getElementById('secret-project').value;
        const key = document.getElementById('secret-key').value;
        const value = document.getElementById('secret-value').value;
        await api('/api/projects/' + slug + '/secrets/' + encodeURIComponent(key), { method:'PUT', body: JSON.stringify({ value }) });
        document.getElementById('secret-value').value = '';
        await refreshSecrets(slug); msg('Secret saved');
      } catch (e) { msg(e.message, true); }
    };
    loadMe();
  </script>
</body>
</html>
